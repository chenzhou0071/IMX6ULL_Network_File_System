# IMX6ULL FTP Server Configuration
# 配置文件格式：节名.键名 = 值

[server]
port = 8888
max_connections = 10
timeout = 300
log_level = info

[users]
admin:admin123:rw
guest:guest123:ro

[paths]
root_dir = /home/root
upload_dir = /home/root/uploads
log_dir = ./logs

[transfer]
max_concurrent = 3
max_file_size = 1073741824
buffer_size = 8192
